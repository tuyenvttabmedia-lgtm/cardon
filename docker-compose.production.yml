# CardOn.vn — Production Docker Compose
# Usage:
#   cp .env.production.example .env.production
#   # fill secrets, then:
#   docker compose -f docker-compose.production.yml up -d --build
#
# Do NOT deploy to real server until ops review is complete.

name: cardon-production

x-backend-env: &backend-env
  APP_ENV: production
  DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
  REDIS_URL: redis://redis:6379
  JWT_SECRET: ${JWT_SECRET}
  JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
  JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY}
  APP_PUBLIC_URL: ${APP_PUBLIC_URL}
  CORS_ORIGINS: ${CORS_ORIGINS}
  WORKER_HEARTBEAT_REQUIRED: ${WORKER_HEARTBEAT_REQUIRED:-true}
  API_PREFIX: api/v1
  MEGAPAY_MERCHANT_ID: ${MEGAPAY_MERCHANT_ID}
  MEGAPAY_SECRET_KEY: ${MEGAPAY_SECRET_KEY}
  MEGAPAY_ENDPOINT: ${MEGAPAY_ENDPOINT}
  MEGAPAY_RETURN_URL: ${MEGAPAY_RETURN_URL}
  MEGAPAY_WEBHOOK_SECRET: ${MEGAPAY_WEBHOOK_SECRET}
  MEGAPAY_CALLBACK_URL: ${MEGAPAY_CALLBACK_URL}
  MEGAPAY_BANK_CODE: ${MEGAPAY_BANK_CODE:-}
  MEGAPAY_NOTIFY_PUBLIC_KEY: ${MEGAPAY_NOTIFY_PUBLIC_KEY:-}
  SEPAY_API_KEY: ${SEPAY_API_KEY}
  SEPAY_WEBHOOK_SECRET: ${SEPAY_WEBHOOK_SECRET}
  SEPAY_BANK_ACCOUNT: ${SEPAY_BANK_ACCOUNT}
  SEPAY_BANK_CODE: ${SEPAY_BANK_CODE:-}
  SEPAY_ACCOUNT_NAME: ${SEPAY_ACCOUNT_NAME:-}
  SEPAY_QR_TEMPLATE: ${SEPAY_QR_TEMPLATE:-compact}
  ESALE_USE_MOCK: "false"
  ESALE_API_URL_CARD: ${ESALE_API_URL_CARD}
  ESALE_API_URL_TOPUP: ${ESALE_API_URL_TOPUP}
  ESALE_AGENCY_CODE: ${ESALE_AGENCY_CODE}
  ESALE_CLIENT_CODE: ${ESALE_CLIENT_CODE:-}
  ESALE_SECRET_KEY: ${ESALE_SECRET_KEY}
  ESALE_PRIVATE_KEY: ${ESALE_PRIVATE_KEY}
  ESALE_PUBLIC_KEY: ${ESALE_PUBLIC_KEY}
  ESALE_TIMEOUT_MS: ${ESALE_TIMEOUT_MS:-30000}
  PROVIDER_LOW_BALANCE_THRESHOLD: ${PROVIDER_LOW_BALANCE_THRESHOLD:-500000}
  AGENT_LOW_BALANCE_THRESHOLD: ${AGENT_LOW_BALANCE_THRESHOLD:-100000}
  SMTP_HOST: ${SMTP_HOST}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER}
  SMTP_PASS: ${SMTP_PASS}
  SMTP_FROM: ${SMTP_FROM:-noreply@cardon.vn}
  SMTP_SECURE: ${SMTP_SECURE:-false}
  ADMIN_ALERT_EMAIL: ${ADMIN_ALERT_EMAIL}
  BUILD_VERSION: ${BUILD_VERSION:-6035.2 AGENT REGISTRATION & KYC CENTER}
  WEB_INTERNAL_URL: ${WEB_INTERNAL_URL:-http://web:3001}
  ADMIN_INTERNAL_URL: ${ADMIN_INTERNAL_URL:-http://admin:3003}
  BACKUP_ENABLED: ${BACKUP_ENABLED:-false}
  BACKUP_DIR: ${BACKUP_DIR:-backups}

services:
  postgres:
    image: postgres:16-alpine
    container_name: cardon-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - cardon_prod_postgres:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - cardon-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: cardon-prod-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - cardon_prod_redis:/data
    networks:
      - cardon-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    image: cardon-api:production
    container_name: cardon-prod-api
    restart: unless-stopped
    environment:
      <<: *backend-env
      APP_ROLE: api
      PORT: 3000
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - cardon_uploads:/app/uploads
      - ./backups:/app/backups:ro
    networks:
      - cardon-internal
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    image: cardon-api:production
    container_name: cardon-prod-worker
    restart: unless-stopped
    environment:
      <<: *backend-env
      APP_ROLE: worker
      RUN_MIGRATIONS: "false"
    command: ["node", "dist/worker.js"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - cardon_uploads:/app/uploads
    networks:
      - cardon-internal
    healthcheck:
      test: ["CMD", "node", "docker/scripts/check-worker-heartbeat.mjs"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        APP_DIR: web
        APP_PORT: 3001
        BUILD_VERSION: ${BUILD_VERSION:-6035.2 AGENT REGISTRATION & KYC CENTER}
        NEXT_PUBLIC_API_URL: ${WEB_NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SITE_URL: ${WEB_NEXT_PUBLIC_SITE_URL}
    image: cardon-web:production
    container_name: cardon-prod-web
    restart: unless-stopped
    environment:
      PORT: 3001
      HOSTNAME: 0.0.0.0
    depends_on:
      api:
        condition: service_healthy
    networks:
      - cardon-internal
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  partner:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        APP_DIR: partner
        APP_PORT: 3002
        NEXT_PUBLIC_API_URL: ${PARTNER_NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SITE_URL: ${PARTNER_NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_PARTNER_API_URL: ${PARTNER_NEXT_PUBLIC_PARTNER_API_URL}
        NEXT_PUBLIC_CUSTOMER_SITE_URL: ${PARTNER_NEXT_PUBLIC_CUSTOMER_SITE_URL}
    image: cardon-partner:production
    container_name: cardon-prod-partner
    restart: unless-stopped
    environment:
      PORT: 3002
      HOSTNAME: 0.0.0.0
    depends_on:
      api:
        condition: service_healthy
    networks:
      - cardon-internal
    expose:
      - "3002"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3002/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  admin:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        APP_DIR: admin
        APP_PORT: 3003
        BUILD_VERSION: ${BUILD_VERSION:-6035.2 AGENT REGISTRATION & KYC CENTER}
        NEXT_PUBLIC_API_URL: ${ADMIN_NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SITE_URL: ${ADMIN_NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_CUSTOMER_SITE_URL: ${WEB_NEXT_PUBLIC_SITE_URL:-https://cardon.vn}
        NEXT_PUBLIC_FRONTEND_URL: ${WEB_NEXT_PUBLIC_SITE_URL:-https://cardon.vn}
    image: cardon-admin:production
    container_name: cardon-prod-admin
    restart: unless-stopped
    environment:
      PORT: 3003
      HOSTNAME: 0.0.0.0
    depends_on:
      api:
        condition: service_healthy
    networks:
      - cardon-internal
    expose:
      - "3003"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3003/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    container_name: cardon-prod-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
      partner:
        condition: service_started
      admin:
        condition: service_started
    networks:
      - cardon-internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://api:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  cardon-internal:
    driver: bridge

volumes:
  cardon_prod_postgres:
  cardon_prod_redis:
  cardon_uploads:
