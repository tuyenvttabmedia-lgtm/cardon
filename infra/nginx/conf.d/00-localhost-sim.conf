# Local simulation — route localhost to customer web + API

# Deprecated customer portal host (6033.7)
server {
  listen 80;
  server_name customer.localhost;
  return 301 http://localhost$request_uri;
}

server {
  listen 80 default_server;
  server_name localhost 127.0.0.1 _;

  location /health {
    proxy_pass http://cardon_api/health;
    include /etc/nginx/conf.d/snippets/proxy-headers.conf;
  }

  location /api/ {
    proxy_pass http://cardon_api/api/;
    include /etc/nginx/conf.d/snippets/proxy-headers.conf;
  }

  location / {
    proxy_pass http://cardon_web;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    include /etc/nginx/conf.d/snippets/proxy-headers.conf;
  }
}

# Partner portal on /partner path for local sim (single-host)
server {
  listen 8080;
  server_name localhost 127.0.0.1;

  location /api/ {
    proxy_pass http://cardon_api/api/;
    include /etc/nginx/conf.d/snippets/proxy-headers.conf;
  }

  location / {
    proxy_pass http://cardon_partner;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    include /etc/nginx/conf.d/snippets/proxy-headers.conf;
  }
}

# Admin panel on port 8081 for local sim
server {
  listen 8081;
  server_name localhost 127.0.0.1;

  location /api/ {
    proxy_pass http://cardon_api/api/;
    include /etc/nginx/conf.d/snippets/proxy-headers.conf;
  }

  location / {
    proxy_pass http://cardon_admin;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    include /etc/nginx/conf.d/snippets/proxy-headers.conf;
  }
}
