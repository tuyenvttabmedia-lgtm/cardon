# partner.cardon.vn — Agent portal

server {
  listen 80;
  server_name partner.cardon.vn;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name partner.cardon.vn;

  ssl_certificate     /etc/nginx/ssl/cardon.vn.pem;
  ssl_certificate_key /etc/nginx/ssl/cardon.vn.key;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;

  location /api/v1/ {
    proxy_pass http://cardon_api/api/v1/;
    include /etc/nginx/conf.d/snippets/proxy-headers.conf;
  }

  location /api/partner/ {
    proxy_pass http://cardon_api/api/partner/;
    include /etc/nginx/conf.d/snippets/proxy-headers.conf;
  }

  include /etc/nginx/conf.d/snippets/uploads-proxy.conf;

  location / {
    proxy_pass http://cardon_partner;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    include /etc/nginx/conf.d/snippets/proxy-headers.conf;
  }
}
