# cardon.vn + www.cardon.vn — Customer website + API proxy

server {
  listen 80;
  server_name cardon.vn www.cardon.vn;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name cardon.vn www.cardon.vn;

  ssl_certificate     /etc/nginx/ssl/cardon.vn.pem;
  ssl_certificate_key /etc/nginx/ssl/cardon.vn.key;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;

  location /health {
    proxy_pass http://cardon_api/health;
    include /etc/nginx/conf.d/snippets/proxy-headers.conf;
  }

  # SePay docs/examples sometimes use /webhooks/ — alias to canonical /webhook/
  location = /api/v1/payments/webhooks/sepay {
    proxy_pass http://cardon_api/api/v1/payments/webhook/sepay;
    include /etc/nginx/conf.d/snippets/proxy-headers.conf;
  }

  location /api/ {
    proxy_pass http://cardon_api/api/;
    include /etc/nginx/conf.d/snippets/proxy-headers.conf;
  }

  include /etc/nginx/conf.d/snippets/uploads-proxy.conf;

  location / {
    proxy_pass http://cardon_web;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    include /etc/nginx/conf.d/snippets/proxy-headers.conf;
  }
}
