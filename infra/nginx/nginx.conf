user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  server_tokens off;
  client_max_body_size 10m;
  client_body_timeout 60s;
  send_timeout 60s;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

  # Re-resolve Docker service names when containers are recreated (prevents 502 stale IP)
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Upstreams (Docker internal DNS)
  upstream cardon_api {
    zone upstream_api 64k;
    server api:3000 resolve;
    keepalive 32;
  }

  upstream cardon_web {
    zone upstream_web 64k;
    server web:3001 resolve;
    keepalive 16;
  }

  upstream cardon_partner {
    zone upstream_partner 64k;
    server partner:3002 resolve;
    keepalive 16;
  }

  upstream cardon_admin {
    zone upstream_admin 64k;
    server admin:3003 resolve;
    keepalive 16;
  }

  # Shared proxy headers
  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  include /etc/nginx/conf.d/*.conf;
}
