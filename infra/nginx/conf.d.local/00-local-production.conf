# Phase 6B — Local production simulation (HTTP only, no SSL)
# Prerequisites: localhost, partner.localhost, admin.localhost → 127.0.0.1
# customer.localhost is deprecated (6033.7) — redirect only, do not add to hosts file.

# Deprecated customer portal host → canonical B2C site
server {
  listen 80;
  server_name customer.localhost;

  return 301 http://localhost$request_uri;
}

# Public B2C website + API (account embedded at /tai-khoan)
server {
  listen 80 default_server;
  server_name localhost 127.0.0.1;

  location /health {
    proxy_pass http://cardon_api/health;
    include /etc/nginx/conf.d/snippets/proxy-headers.conf;
  }

  location /api/ {
    proxy_pass http://cardon_api/api/;
    include /etc/nginx/conf.d/snippets/proxy-headers.conf;
  }

  include /etc/nginx/conf.d/snippets/uploads-proxy.conf;

  location / {
    proxy_pass http://cardon_web;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    include /etc/nginx/conf.d/snippets/proxy-headers.conf;
  }
}

