# CardOn — Phase 6E Local Full Deployment
# Complete stack for manual testing (staging + mock eSale).
#
# Prerequisites: localhost, partner.localhost, admin.localhost → 127.0.0.1
#
# Clean rebuild:
#   docker compose -f docker-compose.local-full.yml --env-file .env.local-full down -v --remove-orphans
#   docker compose -f docker-compose.local-full.yml --env-file .env.local-full build --no-cache
#   docker compose -f docker-compose.local-full.yml --env-file .env.local-full up -d
#
# Bootstrap test data (after stack healthy):
#   docker exec cardon-local-full-api node --experimental-strip-types /app/scripts/seed-local-full.ts
#   docker cp scripts/local-dev-kyc-helper.ts cardon-local-full-api:/app/scripts/
#   docker exec cardon-local-full-api node --experimental-strip-types /app/scripts/local-dev-kyc-helper.ts

name: cardon-local-full

x-backend-env: &backend-env
  APP_ENV: staging
  BUILD_VERSION: "6035.2 AGENT REGISTRATION & KYC CENTER"
  NEXT_PUBLIC_BUILD_VERSION: "6035.2 AGENT REGISTRATION & KYC CENTER"
  WEB_INTERNAL_URL: http://web:3001
  ADMIN_INTERNAL_URL: http://admin:3003
  ESALE_USE_MOCK: "true"
  DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
  REDIS_URL: redis://redis:6379
  JWT_SECRET: ${JWT_SECRET}
  JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
  JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY}
  APP_PUBLIC_URL: ${APP_PUBLIC_URL}
  PARTNER_PUBLIC_URL: ${PARTNER_PUBLIC_URL:-http://partner.localhost}
  CORS_ORIGINS: ${CORS_ORIGINS}
  WORKER_HEARTBEAT_REQUIRED: ${WORKER_HEARTBEAT_REQUIRED:-true}
  API_PREFIX: api/v1
  MEGAPAY_MERCHANT_ID: ${MEGAPAY_MERCHANT_ID}
  MEGAPAY_SECRET_KEY: ${MEGAPAY_SECRET_KEY}
  MEGAPAY_ENDPOINT: ${MEGAPAY_ENDPOINT}
  MEGAPAY_RETURN_URL: ${MEGAPAY_RETURN_URL}
  MEGAPAY_WEBHOOK_SECRET: ${MEGAPAY_WEBHOOK_SECRET}
  MEGAPAY_CALLBACK_URL: ${MEGAPAY_CALLBACK_URL}
  SEPAY_API_KEY: ${SEPAY_API_KEY}
  SEPAY_WEBHOOK_SECRET: ${SEPAY_WEBHOOK_SECRET}
  SEPAY_BANK_ACCOUNT: ${SEPAY_BANK_ACCOUNT}
  SEPAY_BANK_CODE: ${SEPAY_BANK_CODE:-}
  SEPAY_ACCOUNT_NAME: ${SEPAY_ACCOUNT_NAME:-}
  SEPAY_QR_TEMPLATE: ${SEPAY_QR_TEMPLATE:-compact}
  ESALE_API_URL_CARD: ${ESALE_API_URL_CARD}
  ESALE_API_URL_TOPUP: ${ESALE_API_URL_TOPUP}
  ESALE_AGENCY_CODE: ${ESALE_AGENCY_CODE}
  ESALE_CLIENT_CODE: ${ESALE_CLIENT_CODE:-}
  ESALE_SECRET_KEY: ${ESALE_SECRET_KEY}
  ESALE_PRIVATE_KEY: ${ESALE_PRIVATE_KEY}
  ESALE_PUBLIC_KEY: ${ESALE_PUBLIC_KEY}
  ESALE_TIMEOUT_MS: ${ESALE_TIMEOUT_MS:-30000}
  PROVIDER_LOW_BALANCE_THRESHOLD: ${PROVIDER_LOW_BALANCE_THRESHOLD:-500000}
  AGENT_LOW_BALANCE_THRESHOLD: ${AGENT_LOW_BALANCE_THRESHOLD:-100000}
  AGENT_REGISTRATION_MODE: ${AGENT_REGISTRATION_MODE:-PUBLIC_APPROVAL}
  AUTH_LOGIN_THROTTLE_LIMIT: ${AUTH_LOGIN_THROTTLE_LIMIT:-100}
  AUTH_REFRESH_THROTTLE_LIMIT: ${AUTH_REFRESH_THROTTLE_LIMIT:-100}
  SMTP_HOST: ${SMTP_HOST}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER}
  SMTP_PASS: ${SMTP_PASS}
  SMTP_FROM: ${SMTP_FROM:-noreply@cardon.vn}
  SMTP_SECURE: ${SMTP_SECURE:-false}
  ADMIN_ALERT_EMAIL: ${ADMIN_ALERT_EMAIL}
  SEED_SUPER_ADMIN_EMAIL: ${SEED_SUPER_ADMIN_EMAIL}
  SEED_SUPER_ADMIN_PASSWORD: ${SEED_SUPER_ADMIN_PASSWORD}

services:
  postgres:
    image: postgres:16-alpine
    container_name: cardon-local-full-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - cardon_local_full_postgres:/var/lib/postgresql/data
    networks:
      - cardon-local-full
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: cardon-local-full-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - cardon_local_full_redis:/data
    networks:
      - cardon-local-full
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    image: cardon-api:local-full
    container_name: cardon-local-full-api
    restart: unless-stopped
    environment:
      <<: *backend-env
      APP_ROLE: api
      PORT: 3000
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      RUN_SEED: ${RUN_SEED:-true}
      LOCAL_FULL_PASSWORD: ${LOCAL_FULL_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - cardon_uploads:/app/uploads
    networks:
      - cardon-local-full
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    image: cardon-api:local-full
    container_name: cardon-local-full-worker
    restart: unless-stopped
    environment:
      <<: *backend-env
      APP_ROLE: worker
      RUN_MIGRATIONS: "false"
      RUN_SEED: "false"
    command: ["node", "dist/worker.js"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - cardon_uploads:/app/uploads
    networks:
      - cardon-local-full
    healthcheck:
      test: ["CMD", "node", "docker/scripts/check-worker-heartbeat.mjs"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        APP_DIR: web
        APP_PORT: 3001
        BUILD_VERSION: "6035.2 AGENT REGISTRATION & KYC CENTER"
        NEXT_PUBLIC_BUILD_VERSION: "6035.2 AGENT REGISTRATION & KYC CENTER"
        NEXT_PUBLIC_API_URL: ${WEB_NEXT_PUBLIC_API_URL:-http://localhost/api/v1}
        NEXT_PUBLIC_SITE_URL: ${WEB_NEXT_PUBLIC_SITE_URL}
    image: cardon-web:local-full
    container_name: cardon-local-full-web
    restart: unless-stopped
    environment:
      PORT: 3001
      HOSTNAME: 0.0.0.0
      BUILD_VERSION: "6035.2 AGENT REGISTRATION & KYC CENTER"
      NEXT_PUBLIC_BUILD_VERSION: "6035.2 AGENT REGISTRATION & KYC CENTER"
      API_INTERNAL_URL: http://api:3000/api/v1
    depends_on:
      api:
        condition: service_healthy
    networks:
      - cardon-local-full
    expose:
      - "3001"

  partner:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        APP_DIR: partner
        APP_PORT: 3002
        NEXT_PUBLIC_API_URL: ${PARTNER_NEXT_PUBLIC_API_URL:-http://partner.localhost/api/v1}
        NEXT_PUBLIC_SITE_URL: ${PARTNER_NEXT_PUBLIC_SITE_URL:-http://partner.localhost}
        NEXT_PUBLIC_PARTNER_API_URL: ${PARTNER_NEXT_PUBLIC_PARTNER_API_URL:-http://partner.localhost/api/partner/v1}
        NEXT_PUBLIC_CUSTOMER_SITE_URL: ${PARTNER_NEXT_PUBLIC_CUSTOMER_SITE_URL:-http://localhost}
        BUILD_VERSION: "6035.2 AGENT REGISTRATION & KYC CENTER"
        NEXT_PUBLIC_BUILD_VERSION: "6035.2 AGENT REGISTRATION & KYC CENTER"
    image: cardon-partner:local-full
    container_name: cardon-local-full-partner
    restart: unless-stopped
    environment:
      PORT: 3002
      HOSTNAME: 0.0.0.0
      BUILD_VERSION: "6035.2 AGENT REGISTRATION & KYC CENTER"
      NEXT_PUBLIC_BUILD_VERSION: "6035.2 AGENT REGISTRATION & KYC CENTER"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - cardon-local-full
    expose:
      - "3002"

  admin:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        APP_DIR: admin
        APP_PORT: 3003
        NEXT_PUBLIC_API_URL: ${ADMIN_NEXT_PUBLIC_API_URL:-http://admin.localhost/api/v1}
        NEXT_PUBLIC_SITE_URL: ${ADMIN_NEXT_PUBLIC_SITE_URL:-http://admin.localhost}
        NEXT_PUBLIC_FRONTEND_URL: ${ADMIN_NEXT_PUBLIC_FRONTEND_URL:-http://localhost}
        BUILD_VERSION: "6035.2 AGENT REGISTRATION & KYC CENTER"
        NEXT_PUBLIC_BUILD_VERSION: "6035.2 AGENT REGISTRATION & KYC CENTER"
    image: cardon-admin:local-full
    container_name: cardon-local-full-admin
    restart: unless-stopped
    environment:
      PORT: 3003
      HOSTNAME: 0.0.0.0
      BUILD_VERSION: "6035.2 AGENT REGISTRATION & KYC CENTER"
      NEXT_PUBLIC_BUILD_VERSION: "6035.2 AGENT REGISTRATION & KYC CENTER"
      NEXT_PUBLIC_SETTINGS_DEVELOPER_MODE: "true"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - cardon-local-full
    expose:
      - "3003"

  nginx:
    image: nginx:1.27-alpine
    container_name: cardon-local-full-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d.local:/etc/nginx/conf.d:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
      partner:
        condition: service_started
      admin:
        condition: service_started
    networks:
      - cardon-local-full
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  cardon-local-full:
    driver: bridge

volumes:
  cardon_local_full_postgres:
  cardon_local_full_redis:
  cardon_uploads:
