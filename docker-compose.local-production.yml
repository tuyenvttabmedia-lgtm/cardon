# Phase 6B — Local production simulation overrides
# Usage:
#   docker compose \
#     -f docker-compose.production.yml \
#     -f docker-compose.local-production.yml \
#     --env-file .env.local-production \
#     up -d --build

services:
  postgres:
    ports:
      - "5433:5432"

  api:
    # /health/ready requires worker heartbeat — use /health for bootstrap (worker depends on api)
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]

  worker:
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

  nginx:
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d.local:/etc/nginx/conf.d:ro
